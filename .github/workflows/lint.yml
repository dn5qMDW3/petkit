name: "Lint"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: "Install ruff"
        run: pip install ruff

      - name: "Run ruff check"
        run: ruff check custom_components/

      - name: "Run ruff format check"
        run: ruff format --check custom_components/
